// Control-plane protocol for the vla-ci LAN agent (replaces SSH). One request,
// one reply, over a ZeroMQ REQ/REP socket on a LAN port. Mirrors the project's
// existing protobuf-over-ZMQ data plane (src/serving/vla.proto). Ops:
//   ping  - liveness + host info
//   put   - upload a gzip-tar of the PR checkout, extract on the server
//   exec  - run a command to completion, return exit code + captured output
//   spawn - launch a detached background process (the server), return its pid
//   stop  - terminate a previously-spawned process group by name
//   get   - download a file (server log / mem.json) back to the orchestrator
syntax = "proto3";

package vla_ctl;

message PingRequest {}
message PingReply {
  string os      = 1;   // uname sysname (Linux / Darwin)
  string machine = 2;   // uname machine (x86_64 / aarch64 / arm64)
  string cwd     = 3;
}

message PutRequest {
  string          dst     = 1;   // absolute dir to extract into (created if absent)
  bytes           targz   = 2;   // gzip-tar stream of the source tree
  bool            prune   = 3;   // delete dst files absent from the tar (rsync --delete)
  repeated string protect = 4;   // path prefixes (relative to dst) never pruned
}
message PutReply { uint32 files = 1; uint32 pruned = 2; }

message ExecRequest {
  string          cwd  = 1;
  repeated string argv = 2;      // exec'd directly (no shell); use ["bash","-lc",...] for scripts
  repeated string env  = 3;      // "KEY=VALUE" overrides
}
message ExecReply { int32 exit_code = 1; string output = 2; }   // output = stdout+stderr

message SpawnRequest {
  string          name    = 1;   // handle used by stop
  string          cwd     = 2;
  repeated string argv    = 3;
  repeated string env     = 4;
  string          logfile = 5;   // server-side path; stdout+stderr redirected here
}
message SpawnReply { int32 pid = 1; }

message StopRequest { string name = 1; }
message StopReply   { bool stopped = 1; int32 pid = 2; }

message GetRequest { string path = 1; }
message GetReply   { bytes data = 1; }

message Request {
  string token = 1;              // optional shared secret (see --token); "" if disabled
  oneof op {
    PingRequest  ping  = 2;
    PutRequest   put   = 3;
    ExecRequest  exec  = 4;
    SpawnRequest spawn = 5;
    StopRequest  stop  = 6;
    GetRequest   get   = 7;
  }
}

message Reply {
  bool   ok    = 1;
  string error = 2;
  oneof result {
    PingReply  ping  = 3;
    PutReply   put   = 4;
    ExecReply  exec  = 5;
    SpawnReply spawn = 6;
    StopReply  stop  = 7;
    GetReply   get   = 8;
  }
}
